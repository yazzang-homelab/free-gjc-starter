# free-gjc-starter — beginner FREE profile for gajae-code (gjc).
#
# 메인 루프(default) = 당신의 Gemini(구독 또는 무료), OAuth 로그인으로 사용 → 파일에 키 없음.
# 서브에이전트(executor/architect/planner/critic) = "당신 본인"이 발급받은 무료 키로 쓰는 무료 모델.
#
# ★ 이 파일에는 비밀정보가 하나도 없다. 모든 키는 환경변수 "이름"(apiKeyEnv)으로만 참조한다.
#   진짜 키는 각자 자기 셸 환경변수에 넣는다 (README 참고). 절대 이 파일에 리터럴로 박지 마라.

providers:
  # --- 무료 서브에이전트 #1: OpenRouter (:free 모델) ---
  # 무료 키 발급: https://openrouter.ai/keys   →   export OPENROUTER_API_KEY=...
  openrouter-free:
    baseUrl: https://openrouter.ai/api/v1
    apiKeyEnv: OPENROUTER_API_KEY
    api: openai-completions
    headers:
      HTTP-Referer: https://github.com/yazzang-homelab/free-gjc-starter
      X-Title: free-gjc
    models:
      - id: nvidia/nemotron-3-super-120b-a12b:free
        name: 【무료】 Nemotron 3 Super 120B · OpenRouter
        reasoning: true
        input: [text]
        contextWindow: 1000000
        maxTokens: 32000
        cost: { input: 0, output: 0, cacheRead: 0, cacheWrite: 0 }

  # --- 무료 서브에이전트 #2: Groq (매우 빠름) ---
  # 무료 키 발급: https://console.groq.com/keys   →   export GROQ_API_KEY=...
  groq-free:
    baseUrl: https://api.groq.com/openai/v1
    apiKeyEnv: GROQ_API_KEY
    api: openai-completions
    models:
      - id: llama-3.3-70b-versatile
        name: 【무료】 Llama 3.3 70B · Groq
        reasoning: false
        input: [text]
        contextWindow: 128000
        maxTokens: 32000
        cost: { input: 0, output: 0, cacheRead: 0, cacheWrite: 0 }
      - id: llama-3.1-8b-instant
        name: 【무료】 Llama 3.1 8B Instant · Groq
        reasoning: false
        input: [text]
        contextWindow: 128000
        maxTokens: 8000
        cost: { input: 0, output: 0, cacheRead: 0, cacheWrite: 0 }

  # --- 무료 메인 대안(2nd): NVIDIA NIM · GLM-5.2 ---
  # Gemini를 아예 안 쓰는 사람용 메인 모델 후보 + Gemini 장애 시 default 폴백.
  # 무료 키 발급: https://build.nvidia.com/z-ai/glm-5.2  →  export NVIDIA_API_KEY=...
  nvidia-nim:
    baseUrl: https://integrate.api.nvidia.com/v1
    apiKeyEnv: NVIDIA_API_KEY
    api: openai-completions
    models:
      - id: z-ai/glm-5.2
        name: 【무료】 GLM-5.2 (753B) · NVIDIA NIM
        reasoning: true
        input: [text]
        contextWindow: 1000000
        maxTokens: 32000
        cost: { input: 0, output: 0, cacheRead: 0, cacheWrite: 0 }

  # 메인 루프(default)는 gjc 내장 google provider를 OAuth 로그인으로 쓴다 → 여기 항목 불필요.
  #   구독(Google AI/Antigravity): /login google-antigravity
  #   무료(Gemini CLI, 구글 계정):  /login google-gemini-cli  (README에서 default 셀렉터만 교체)
